name: Matrix OS Test

on: [push]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Test with Maven
        run: mvn test
        
      - name: Support long paths and fix line endings
        run: |
          git config --global core.longpaths true
          git config --global core.autocrlf input
      
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Test
        # Thêm -B (Batch mode) để tránh các ký tự điều khiển làm treo terminal
        run: mvn clean test -B